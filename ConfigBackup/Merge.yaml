profile:
  store-selected: true
  block-quic: true      # 强力阻断 QUIC，防止浏览器握手回落到卡顿节点，强制走高速 TCP 代理隧道

ipv6: false

tun:
  enable: true
  stack: mixed          # mixed 栈是当前在 Windows 上网络性能和兼容性最平衡的选择
  device: clash-core
  auto-route: true
  auto-detect-interface: true
  mtu: 1500             # 强制锁定虚拟网卡 MTU 为 1500，完美适配物理网卡并打通 WSL2 镜像网络

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  
  # =====================================================================
  # 瘦身后的 fake-ip-filter (100% 根除 DNS 污染，提升网络吞吐效率)
  # =====================================================================
  fake-ip-filter:
    # 1. 本地环回与局域网解析（核心防御：杜绝本地 gRPC 及 OAuth 登录回调被 fake-ip 污染）
    - "localhost"
    - "127.0.0.1"
    - "::1"
    - "*.local"
    - "localhost.ptlogin2.qq.com"

    # 2. 国内直连与内网镜像加速（强制本地真实解析，提高拉取速度）
    - "mirrors.pku.edu.cn"
    - "mirrors.tuna.tsinghua.edu.cn"
    - "mirrors.aliyun.com"
    - "mirrors.ustc.edu.cn"
